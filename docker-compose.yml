# =============================================================================
# Streaming Billing — Local orchestration
# =============================================================================
# MongoDB Atlas + AWS MSK are remote managed services (see .env / decisions.md).
# This compose file runs only the locally-controlled processes:
#   - backend (FastAPI)
#   - frontend (SvelteKit dev server)
#   - simulator (transaction event producer → MSK)
#   - feature engineer worker
#   - rule change-stream watcher
#
# Run `make seed` once on first boot, and `make asp-deploy` to push ASP pipelines.
# =============================================================================
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
    volumes:
      - ./backend:/app
      - ${TLS_CERT_PATH:-/dev/null}:/certs/atlas.pem:ro
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PUBLIC_API_BASE=http://localhost:8000
      - PUBLIC_SSE_BASE=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app
    command: python -m app.workers.transaction_simulator
    depends_on:
      - backend

  feature-engineer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app
    command: python -m app.workers.feature_engineer
    depends_on:
      - backend

  rules-watcher:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app
    command: python -m app.workers.rule_change_watcher
    depends_on:
      - backend
